name: Build & Push (API)
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: bp
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
            
      - name: Show digest
        run: echo "Digest is ${{ steps.bp.outputs.digest }}"
      
      - name: Notify ops repo
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.OPSPROD_DISPATCH_TOKEN }}
          repository: shuky-personal-org/investment-ops
          event-type: image-published
          client-payload: >
            {
              "service": "websockify-tws",
              "image": "ghcr.io/${{ github.repository }}",
              "digest": "${{ steps.bp.outputs.digest }}"
            }
      
      - name: Notify ops repo
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.OPSPROD_DISPATCH_TOKEN }}
          repository: shuky-personal-org/investment-ops
          event-type: image-published
          client-payload: >
            {
              "service": "websockify-pp-ui",
              "image": "ghcr.io/${{ github.repository }}",
              "digest": "${{ steps.bp.outputs.digest }}"
            }